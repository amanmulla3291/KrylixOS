# KrylixOS Linux Kickstart Configuration
# ks.cfg — Universal base image with post-install profile selector
# ISO built from: Fedora 43 minimal + KrylixOS RPM repository
# baseurl: https://amanmulla3291.github.io/KrylixOS/repo/

##############################################################################
# Installation method
##############################################################################

install
text
reboot

##############################################################################
# Locale and keyboard
##############################################################################

lang en_US.UTF-8
keyboard us
timezone UTC --utc

##############################################################################
# Network — DHCP at install, hardened post-install
##############################################################################

network --bootproto=dhcp --activate
network --hostname=krylix

##############################################################################
# Users — no root password by default (key-only SSH access)
#         Set during %post via PAM/shadow manipulation
##############################################################################

rootpw --lock
# Admin user — SSH key set via %post from installer prompt
user --name=krylix-admin --groups=wheel --shell=/bin/bash --lock

##############################################################################
# Security
##############################################################################

selinux --enforcing
firewall --enabled --ssh
authselect select hardening with-faillock --force

##############################################################################
# Storage — LUKS2 with Argon2id KDF
#           Partition layout: /boot (unencrypted), / (XFS on LUKS2)
##############################################################################

# Clear all partitions
clearpart --all --initlabel

# /boot — must be unencrypted for GRUB2 + shim
part /boot     --fstype=xfs    --size=1024    --label=boot
part /boot/efi --fstype=efi    --size=512     --label=efi --fsoptions="umask=0077"

# LUKS2 physical volume
part pv.01 --size=1 --grow --encrypted --luks-version=luks2 \
    --pbkdf=argon2id --pbkdf-memory=1048576 --pbkdf-iterations=4 --pbkdf-parallel=4

volgroup krylix_vg pv.01

# Root on XFS — RHEL default, excellent on AWS EBS
logvol / --vgname=krylix_vg --fstype=xfs --size=1 --grow --name=root --label=root

##############################################################################
# Bootloader — GRUB2 with hardened kernel cmdline
##############################################################################

bootloader \
    --location=mbr \
    --boot-drive=sda \
    --append="init_on_alloc=1 init_on_free=1 vsyscall=none page_alloc.shuffle=1 security=selinux enforcing=1"

##############################################################################
# Software sources
##############################################################################

# Fedora 43 minimal base
url --url="https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/"

# KrylixOS signed RPM repository (GitHub Pages)
repo --name=krylix \
     --baseurl=https://amanmulla3291.github.io/KrylixOS/repo/ \
     --gpgkey=https://amanmulla3291.github.io/KrylixOS/RPM-GPG-KEY-KrylixOS \
     --gpgcheck=1

##############################################################################
# Package selection — minimal, security-first, zero bloat
# DO NOT ADD: snap, flatpak, pulseaudio, bluetooth, cups, avahi, telemetry
##############################################################################

%packages --ignoremissing
# Kernel
kernel-krylix
krylix-release

# Core system
systemd
systemd-networkd
systemd-resolved
util-linux
procps-ng
coreutils
bash
shadow-utils
passwd
pam
pam_faillock

# Security stack (mandatory)
selinux-krylix-policy
selinux-policy-targeted
policycoreutils
policycoreutils-python-utils
libselinux-utils
setools-console
auditd
audit
setroubleshoot-server
falco
falco-rules-krylix

# Firewall
nftables
firewalld

# Disk / crypto
cryptsetup
lvm2
clevis
clevis-luks
clevis-dracut
dracut
dracut-config-rescue
jose
luksmeta

# Network
openssh-server
openssh-clients
curl
wget
nss-tools

# TPM2 (bare metal and testing — disabled in AWS/VM profiles)
tpm2-tools
tpm2-abrmd
clevis-pin-tpm2

# Build / admin tools
rpm
dnf5
dnf5-plugins
rpm-build
rpmsign
sbsigntools

# Monitoring
audit
ausearch

# Excluded explicitly (attack surface reduction):
# -snap
# -snapd
# -flatpak
# -pulseaudio
# -pipewire
# -bluetooth
# -bluez
# -cups
# -avahi
# -NetworkManager  (use systemd-networkd)
# -ModemManager
# -wpa_supplicant  (server — no WiFi)
# -xorg-x11-*
# -gnome-*
# -kde-*
%end

##############################################################################
# %pre — Profile selection (runs before installation)
##############################################################################

%pre --erroronfail
#!/bin/bash
# Interactive profile selector shown at installer boot
echo ""
echo "╔══════════════════════════════════════════╗"
echo "║     KrylixOS Linux — Profile Selector   ║"
echo "║     Trust nothing. Verify everything.    ║"
echo "╚══════════════════════════════════════════╝"
echo ""
echo "Select deployment target:"
echo "  [1] Bare Metal  — TPM2 LUKS2 (PCRs 0+1+7), IOMMU force-on"
echo "  [2] Virtual Machine — Passphrase LUKS2, virtio-rng seeding"
echo "  [3] AWS Cloud   — Clevis/Tang LUKS2, 30s timeout fallback, IMDSv2"
echo ""
echo -n "Enter choice [1-3]: "
read -r PROFILE_CHOICE

case "${PROFILE_CHOICE}" in
    1) echo "bare-metal" > /tmp/krylix-profile ;;
    2) echo "vm"         > /tmp/krylix-profile ;;
    3) echo "aws"        > /tmp/krylix-profile ;;
    *)
        echo "Invalid choice. Defaulting to VM profile."
        echo "vm" > /tmp/krylix-profile
        ;;
esac

SELECTED=$(cat /tmp/krylix-profile)
echo ""
echo "  ✓ Profile selected: ${SELECTED}"
echo "  Post-install script will apply profile-specific hardening."
echo ""
%end

##############################################################################
# %post — Apply profile-specific hardening after package install
##############################################################################

%post --erroronfail --log=/root/krylix-install.log
#!/bin/bash
set -euo pipefail

PROFILE=$(cat /tmp/krylix-profile 2>/dev/null || echo "vm")
echo "[post] KrylixOS post-install — profile: ${PROFILE}"

# Install GPG key
rpm --import https://amanmulla3291.github.io/KrylixOS/RPM-GPG-KEY-KrylixOS 2>/dev/null || \
    echo "[post] Warning: GPG key import failed (no network at install time)"

# Apply profile
case "${PROFILE}" in
    bare-metal)
        bash /usr/share/krylix/profiles/bare-metal.sh
        ;;
    vm)
        bash /usr/share/krylix/profiles/vm.sh
        ;;
    aws)
        bash /usr/share/krylix/profiles/cloud-aws.sh
        ;;
esac

# Common: lock root account, force key-based SSH
passwd -l root
echo "[post] Root account locked. SSH key required."

# Common: SELinux relabel on next boot
touch /.autorelabel
echo "[post] SELinux relabel scheduled for next boot."

# Verify Falco will start (Gap 1 fix sanity check)
if systemctl is-enabled falco &>/dev/null; then
    echo "[post] Falco: enabled ✓ (selinux-krylix-policy provides falco_t domain)"
else
    echo "[post] WARNING: Falco not enabled — ensure selinux-krylix-policy is installed"
fi

echo "[post] Installation complete. Rebooting..."
%end

##############################################################################
# %post nochroot — operations requiring host filesystem access
##############################################################################

%post --nochroot --log=/root/krylix-post-nochroot.log
# Copy profile scripts to installed system
install -Dm755 /run/install/repo/profiles/bare-metal.sh \
    /mnt/sysimage/usr/share/krylix/profiles/bare-metal.sh
install -Dm755 /run/install/repo/profiles/vm.sh \
    /mnt/sysimage/usr/share/krylix/profiles/vm.sh
install -Dm755 /run/install/repo/profiles/cloud-aws.sh \
    /mnt/sysimage/usr/share/krylix/profiles/cloud-aws.sh
%end
